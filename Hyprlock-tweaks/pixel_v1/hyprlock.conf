# ============================================================
#  Pixel Night City — Accurate Replica
# ============================================================

general {
    ignore_empty_input = false
}

# ============================================================
#  BACKGROUND (CRISP — NO BLUR)
# ============================================================

background {
    path = /home/doom/D:/Wallpapers/wp11327275-arts-4k-hd-wallpapers.png
    blur_passes = 0
    brightness = 0.7
}

animations {
    enabled = false
}

# ============================================================
#  CLOCK (TOP LEFT — CLEAN)
# ============================================================

label {
    text = cmd[update:1000] echo "$(date +'%-I:%M')"
    font_size = 110
    font_family = Pixelify Sans Bold
    color = rgba(255, 255, 255, 1.0)

    position = 60, -60
    halign = left
    valign = top
}

# DATE (under clock)
label {
    text = cmd[update:60000] echo "$(date +'%A, %B %-d' | tr '[:lower:]' '[:upper:]')"
    font_size = 16
    font_family = Pixelify Sans Bold
    color = rgba(208, 104, 128, 0.8)

    position = 75, -210   # ← FIXED (was -160)
    halign = left
    valign = top
}


label {
    text = ネオン     システム     リスタート
    font_size = 15
    font_family = Pixelify Sans Bold
    color = rgba(232, 228, 240, 0.7)

    position = -40, -40
    halign = right
    valign = top
}


label {
    text = ネオン都市
    # text = ワンピース
    font_size = 56
    font_family = DelaGothicOne
    color = rgba(235, 230, 245, 0.95)

    position = 0, 260
    halign = center
    valign = bottom
}

# DIVIDER LINE
shape {
    size = 800, 2
    color = rgba(208, 104, 128, 0.6)

    position = 0, 130
    halign = center
    valign = bottom
}



input-field {
    size = 450, 60
    position = 0, 130
    halign = center
    valign = bottom

    outline_thickness = 0
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)

    rounding = 0

    font_family = Pixelify Sans Bold
    font_size = 32
    font_color = rgba(232, 228, 240, 1.0)

    hide_input = false

    placeholder_text = --- LOGIN ---

    check_color  = rgba(80, 200, 216, 1.0)
    fail_color   = rgba(255, 80, 80, 1.0)
    fail_text    = ACCESS DENIED
    fail_timeout = 1500

    capslock_color = rgba(200, 128, 74, 1.0)

    fade_on_empty = false
}

# ============================================================
#  AUTH
# ============================================================

auth {
    fingerprint:enabled = true
}